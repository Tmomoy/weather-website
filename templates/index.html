<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>天氣預報站</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
}

.container{
text-align:center;
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
width:520px;
}

.search-box{
position:relative;
display:inline-block;
}

input{
padding:12px;
border-radius:10px;
border:none;
width:260px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ffcc00;
margin-top:15px;
cursor:pointer;
}

.location-btn{
background:#00e5ff;
}

.autocomplete{
position:absolute;
top:45px;
left:0;
background:white;
color:black;
width:260px;
border-radius:10px;
max-height:200px;
overflow-y:auto;
}

.autocomplete div{
padding:8px;
cursor:pointer;
}

.autocomplete div:hover{
background:#eee;
}

.forecast{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:15px;
}

.day{
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:10px;
min-width:80px;
text-align:center;
}

.day img{
width:40px;
}

</style>
</head>

<body>

<div class="container">

<h1>🌤 天氣預報站</h1>

<form method="post">

<div class="search-box">

<input id="cityInput" name="city" placeholder="輸入城市或地區">

<div id="autocomplete" class="autocomplete"></div>

</div>

<br>

<button type="submit">查詢天氣</button>

<button type="button" class="location-btn" onclick="getLocation()">📍 我的定位</button>

</form>

{% if weather %}

<h2>{{weather.city}}</h2>

<img src="https://openweathermap.org/img/wn/{{weather.icon}}@2x.png">

<p>{{weather.temp}}°C</p>
<p>{{weather.description}}</p>
<p>濕度 {{weather.humidity}}%</p>

{% endif %}

{% if today %}

<h3>今日24小時</h3>

<div class="forecast">

{% for t in today %}

<div class="day">

<p>{{t.time}}</p>
<img src="https://openweathermap.org/img/wn/{{t.icon}}@2x.png">
<p>{{t.temp}}°C</p>

</div>

{% endfor %}

</div>

<canvas id="tempChart"></canvas>

{% endif %}

</div>

<script>

function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

window.location.href="/?lat="+pos.coords.latitude+"&lon="+pos.coords.longitude

})

}

const cities = {{ districts | tojson }}

const input = document.getElementById("cityInput")
const box = document.getElementById("autocomplete")

input.addEventListener("input", function(){

let val = this.value
box.innerHTML = ""

if(!val) return

cities.forEach(city => {

if(city.includes(val)){

let div = document.createElement("div")

div.textContent = city

div.onclick = function(){

input.value = city
box.innerHTML = ""

}

box.appendChild(div)

}

})

})

</script>

</body>
</html>
