<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>天氣預報站</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
}

.container{
text-align:center;
background:rgba(0,0,0,0.3);
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

input{
padding:10px;
border:none;
border-radius:8px;
width:200px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ffcc00;
cursor:pointer;
}

.weather-icon{
width:100px;
}

.card{
margin-top:20px;
}

.forecast{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
gap:10px;
}

.day{
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:10px;
width:80px;
}

</style>

</head>

<body>

<div class="container">

<h1>🌤 天氣預報站</h1>

<form method="post">
<input type="text" name="city" placeholder="輸入城市">
<button type="submit">查詢</button>
</form>

{% if weather %}

<div class="card">

<h2>{{ weather.city }}</h2>

<img class="weather-icon"
src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png">

<p>🌡 溫度 {{ weather.temp }} °C</p>
<p>☁️ {{ weather.description }}</p>
<p>💧 濕度 {{ weather.humidity }}%</p>

</div>

{% endif %}

{% if forecast %}

<h3>📅 天氣預報</h3>

<div class="forecast">

{% for f in forecast %}

<div class="day">

<p>{{ f.time }}</p>

<img src="https://openweathermap.org/img/wn/{{ f.icon }}@2x.png">

<p>{{ f.temp }}°C</p>

</div>

{% endfor %}

</div>

{% endif %}

</div>

</body>
</html>
