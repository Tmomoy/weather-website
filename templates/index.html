<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>台灣天氣系統</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🌤 台灣天氣系統</h1>

<form action="/weather" method="post">

<input id="cityInput" name="city" placeholder="輸入城市">

<button type="submit">查詢天氣</button>

<button type="button" onclick="gps()">📍 GPS</button>

</form>


<h3>🗺 台灣地圖查天氣</h3>

<img
src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Taiwan_location_map.svg"
width="300"
onclick="mapWeather()"
>


<h3>🌧 雷達降雨圖</h3>

<img
src="https://www.cwa.gov.tw/Data/radar/CV1_3600.png"
width="300"
>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
