<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>天氣預報站</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
text-align:center;
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
width:540px;
}

.search-box{
position:relative;
}

input{
padding:12px;
border-radius:10px;
border:none;
width:260px;
}

.autocomplete{
position:absolute;
background:white;
color:black;
width:260px;
border-radius:10px;
max-height:200px;
overflow:auto;
}

.autocomplete div{
padding:8px;
cursor:pointer;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ffcc00;
margin-top:15px;
cursor:pointer;
}

.location-btn{
background:#00e5ff;
}

.card{
margin-top:20px;
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
}

.forecast{
display:flex;
overflow-x:auto;
gap:10px;
margin-top:15px;
}

.day{
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:10px;
min-width:80px;
}

</style>
</head>

<body>

<div class="container">

<h1>🌤 天氣預報站</h1>

<form method="post">

<div class="search-box">

<input id="cityInput" name="city" placeholder="輸入城市或地區">

<div id="autocomplete" class="autocomplete"></div>

</div>

<br>

<button type="submit">查詢天氣</button>

<button type="button" class="location-btn" onclick="getLocation()">📍 我的定位</button>

</form>


{% if weather %}

<div class="card">

<h2>{{ weather.city }}</h2>

<img src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png">

<p>🌡 {{ weather.temp }}°C</p>
<p>{{ weather.description }}</p>
<p>💧 濕度 {{ weather.humidity }}%</p>

<p>🌅 日出 {{ weather.sunrise }}</p>
<p>🌇 日落 {{ weather.sunset }}</p>

</div>

{% endif %}


{% if today %}

<h3>今日24小時</h3>

<div class="forecast">

{% for t in today %}

<div class="day">

<p>{{t.time}}</p>

<img src="https://openweathermap.org/img/wn/{{t.icon}}@2x.png">

<p>{{t.temp}}°C</p>

</div>

{% endfor %}

</div>

<canvas id="tempChart"></canvas>

{% endif %}

</div>


<script>

function getLocation(){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude
let lon=position.coords.longitude

window.location.href="/?lat="+lat+"&lon="+lon

})

}

const cities={{districts | tojson}}

const input=document.getElementById("cityInput")
const box=document.getElementById("autocomplete")

input.addEventListener("input",function(){

let val=this.value

box.innerHTML=""

if(!val)return

cities.forEach(city=>{

if(city.includes(val)){

let div=document.createElement("div")

div.textContent=city

div.onclick=function(){

input.value=city
box.innerHTML=""

}

box.appendChild(div)

}

})

})

{% if today %}

const ctx=document.getElementById("tempChart")

new Chart(ctx,{
type:"line",
data:{
labels:[{% for t in today %}"{{t.time}}",{% endfor %}],
datasets:[{
label:"溫度",
data:[{% for t in today %}{{t.temp}},{% endfor %}],
borderColor:"yellow"
}]
}
})

{% endif %}

</script>

</body>
</html>
