<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>台灣天氣系統</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

</head>

<body>

<div class="container">

<h1>🌤 台灣天氣系統</h1>

<form action="/weather" method="post">

<input id="cityInput" name="city" placeholder="輸入縣市">

<button type="submit">查詢</button>

<button type="button" onclick="gps()">📍 GPS</button>

</form>


<h3>🗺 台灣地圖</h3>

<svg width="300" height="400">

<rect x="120" y="30" width="80" height="40"
fill="#ddd" onclick="mapCity('臺北市')"/>
<text x="135" y="55">台北</text>

<rect x="110" y="90" width="100" height="40"
fill="#ddd" onclick="mapCity('臺中市')"/>
<text x="130" y="115">台中</text>

<rect x="110" y="150" width="100" height="40"
fill="#ddd" onclick="mapCity('臺南市')"/>
<text x="130" y="175">台南</text>

<rect x="110" y="210" width="100" height="40"
fill="#ddd" onclick="mapCity('高雄市')"/>
<text x="130" y="235">高雄</text>

</svg>


<h3>🌧 雷達動畫</h3>

<img
src="https://www.cwa.gov.tw/Data/radar/CV1_3600.png"
width="300">

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
