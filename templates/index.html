<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>台灣天氣系統 </title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:20px;
text-align:center;
color:white;
width:400px;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:200px;
}

button{
padding:10px 20px;
background:#ffcc00;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🌤 台灣天氣系統</h1>

<form action="/weather" method="post">

<input name="city" placeholder="輸入城市或行政區">

<br><br>

<button type="submit">查詢天氣</button>

</form>

</div>

</body>

</html>
