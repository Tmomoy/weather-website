<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>台灣天氣系統</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
text-align:center;
color:white;
width:420px;
}

input{
padding:10px;
border:none;
border-radius:8px;
width:230px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ffcc00;
cursor:pointer;
margin-top:10px;
}

.autocomplete{
background:white;
color:black;
border-radius:8px;
max-height:200px;
overflow:auto;
margin-top:5px;
}

.autocomplete div{
padding:6px;
cursor:pointer;
}

.autocomplete div:hover{
background:#eee;
}

</style>

</head>

<body>

<div class="container">

<h1>🌤 台灣天氣系統</h1>

<form action="/weather" method="post">

<input id="cityInput" name="city" placeholder="輸入城市或行政區">

<div id="autocomplete" class="autocomplete"></div>

<br>

<button type="submit">查詢天氣</button>

<button type="button" onclick="gps()">📍 GPS</button>

</form>

</div>

<script>

const cities={{districts|tojson}}

const input=document.getElementById("cityInput")
const box=document.getElementById("autocomplete")

input.addEventListener("input",function(){

let val=this.value

box.innerHTML=""

if(!val) return

cities.forEach(city=>{

if(city.includes(val)){

let div=document.createElement("div")

div.textContent=city

div.onclick=function(){

input.value=city
box.innerHTML=""

}

box.appendChild(div)

}

})

})

function gps(){

navigator.geolocation.getCurrentPosition(function(){

alert("GPS功能示範")

})

}

</script>

</body>

</html>
