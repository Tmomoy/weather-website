<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>台灣天氣站</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
transition:0.5s;
}

.container{
background:rgba(0,0,0,0.3);
padding:40px;
border-radius:20px;
text-align:center;
width:420px;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:220px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ffcc00;
margin-top:10px;
cursor:pointer;
}

.autocomplete{
background:white;
color:black;
border-radius:8px;
margin-top:5px;
}

.autocomplete div{
padding:6px;
cursor:pointer;
}

.autocomplete div:hover{
background:#eee;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>🌤 台灣天氣查詢</h1>

<form method="post">

<input id="cityInput" name="city" placeholder="輸入城市或行政區">

<div id="autocomplete" class="autocomplete"></div>

<br>

<button type="submit">查詢天氣</button>

</form>


{% if weather %}

<h2>{{weather.city}}</h2>

<p>天氣：{{weather.wx}}</p>

<p>溫度：{{weather.temp}}°C</p>

<p>降雨機率：{{weather.rain}}%</p>

{% endif %}

<canvas id="tempChart"></canvas>

</div>


<script>

const cities={{districts|tojson}}

const input=document.getElementById("cityInput")

const box=document.getElementById("autocomplete")

input.addEventListener("input",function(){

let val=this.value

box.innerHTML=""

if(!val) return

cities.forEach(city=>{

if(city.includes(val)){

let div=document.createElement("div")

div.textContent=city

div.onclick=function(){

input.value=city
box.innerHTML=""

}

box.appendChild(div)

}

})

})

{% if temps %}

const ctx=document.getElementById('tempChart')

new Chart(ctx,{
type:'line',
data:{
labels:{{times|tojson}},
datasets:[{
label:'溫度',
data:{{temps|tojson}},
borderWidth:3
}]
}
})

{% endif %}


// 夜間模式

let hour=new Date().getHours()

if(hour>=18||hour<=6){

document.body.style.background="linear-gradient(135deg,#141E30,#243B55)"

}

</script>

</body>

</html>
