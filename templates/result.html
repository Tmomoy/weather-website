<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>天氣結果</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.forecast{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:10px;
min-width:120px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>{{weather.city}}</h2>

<p>☁ 天氣：{{weather.wx}}</p>
<p>🌡 溫度：{{weather.temp}}°C</p>
<p>🌧 降雨機率：{{weather.rain}}%</p>

<h3>未來36小時預報</h3>

{% if forecast %}

<div class="forecast">

{% for f in forecast %}

<div class="card">

<p>{{f.time}}</p>
<p>{{f.wx}}</p>
<p>🌡 {{f.temp}}°C</p>
<p>🌧 {{f.rain}}%</p>

</div>

{% endfor %}

</div>

{% else %}

<p>暫無預報資料</p>

{% endif %}

<h3>天氣圖表</h3>

<button onclick="showTemp()">🌡 溫度</button>
<button onclick="showRain()">🌧 降雨</button>
<button onclick="showHum()">💧 濕度</button>

<canvas id="chart"></canvas>

<br><br>

<a href="/"><button>返回查詢</button></a>

</div>

<script>

const times={{times|tojson}}
const temps={{temps|tojson}}
const rains={{rains|tojson}}
const hum={{humidity|tojson}}

let chart=null

function draw(data,label,color){

if(!data || data.length===0){
alert("目前沒有圖表資料")
return
}

const ctx=document.getElementById("chart")

if(chart){
chart.destroy()
}

chart=new Chart(ctx,{
type:'line',
data:{
labels:times,
datasets:[{
label:label,
data:data,
borderWidth:3,
borderColor:color,
backgroundColor:color,
tension:0.3
}]
},
options:{
responsive:true,
plugins:{
legend:{
labels:{color:"white"}
}
},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}
}
})

}

function showTemp(){
draw(temps,"溫度","#ff5733")
}

function showRain(){
draw(rains,"降雨","#3498db")
}

function showHum(){
draw(hum,"濕度","#2ecc71")
}

if(temps.length>0){
showTemp()
}

</script>

</body>

</html>
