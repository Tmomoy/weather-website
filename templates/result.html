<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>天氣結果</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h2>📍 {{weather.city}}</h2>

<p>☁ {{weather.wx}}</p>
<p>🌡 {{weather.temp}}°C</p>
<p>🌧 {{weather.rain}}%</p>

<h3>📊 天氣圖表</h3>

<button onclick="showTemp()">🌡 溫度</button>
<button onclick="showRain()">🌧 降雨</button>
<button onclick="showHum()">💧 濕度</button>

<canvas id="chart"></canvas>

<br><br>

<a href="/"><button>返回查詢</button></a>

</div>

<script>

const times={{times|tojson}}
const temps={{temps|tojson}}
const rains={{rains|tojson}}
const hum={{humidity|tojson}}

let chart=null

function draw(data,label,color){

const ctx=document.getElementById("chart")

if(chart){
chart.destroy()
}

chart=new Chart(ctx,{
type:'line',
data:{
labels:times,
datasets:[{
label:label,
data:data,
borderWidth:3,
borderColor:color,
backgroundColor:color,
tension:0.3
}]
}
})

}

function showTemp(){draw(temps,"溫度","#ff5733")}
function showRain(){draw(rains,"降雨","#3498db")}
function showHum(){draw(hum,"濕度","#2ecc71")}

showTemp()

</script>

</body>
</html>
