<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>天氣結果</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:20px;
width:520px;
text-align:center;
color:white;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#ffcc00;
cursor:pointer;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>{{weather.city}}</h2>

<p>天氣：{{weather.wx}}</p>
<p>溫度：{{weather.temp}}°C</p>
<p>降雨機率：{{weather.rain}}%</p>

<h3>天氣圖表</h3>

<button onclick="showTemp()">🌡 溫度</button>
<button onclick="showRain()">🌧 降雨</button>
<button onclick="showHum()">💧 濕度</button>

<canvas id="chart"></canvas>

<br><br>

<a href="/"><button>返回查詢</button></a>

</div>

<script>

const times={{times|tojson}}
const temps={{temps|tojson}}
const rains={{rains|tojson}}
const hum={{humidity|tojson}}

let chart

function draw(data,label){

const ctx=document.getElementById("chart")

if(chart){
chart.destroy()
}

chart=new Chart(ctx,{
type:'line',
data:{
labels:times,
datasets:[{
label:label,
data:data,
borderWidth:3
}]
}
})

}

function showTemp(){draw(temps,"溫度")}
function showRain(){draw(rains,"降雨")}
function showHum(){draw(hum,"濕度")}

showTemp()

</script>

</body>

</html>
