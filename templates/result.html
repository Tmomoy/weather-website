<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>天氣結果</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h2>📍 {{weather.city}}</h2>

<div class="icon">

{{weather.icon}}

</div>

<p>{{weather.wx}}</p>

<p>🌡 {{weather.temp}}°C</p>

<p>🌧 {{weather.rain}}%</p>

<h3>📅 未來36小時預報</h3>

<div class="forecast">

{% for f in forecast %}

<div class="card">

<div>{{f.time}}</div>

<div>{{f.wx}}</div>

<div>{{f.temp}}°C</div>

<div>{{f.rain}}%</div>

</div>

{% endfor %}

</div>

<h3>📊 天氣圖表</h3>

<button onclick="showTemp()">🌡 溫度</button>

<button onclick="showRain()">🌧 降雨</button>

<button onclick="showHum()">💧 濕度</button>

<canvas id="chart"></canvas>

<br><br>

<a href="/">

<button>返回查詢</button>

</a>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
